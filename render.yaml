# Render Blueprint for Bookmark Graveyard
# Deploys the Telegram bot web service with Postgres database
# Documentation: https://render.com/docs/blueprint-spec

services:
  - type: web
    runtime: node
    name: bookmark-graveyard-bot
    region: singapore
    plan: free
    branch: main
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render dashboard (e.g. from Supabase or Neon)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: DB_SYNCHRONIZE
        value: 'true'
      - key: NODE_VERSION
        value: 20

      - key: SERVICE_URL
        sync: false # Set to your Render URL, e.g. https://bookmark-graveyard-bot.onrender.com


