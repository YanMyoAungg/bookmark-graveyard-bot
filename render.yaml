# Render Blueprint for Bookmark Graveyard
# Deploys the Telegram bot web service with SQLite database
# Documentation: https://render.com/docs/blueprint-spec
# Note: SQLite files are ephemeral on Render (data lost on redeploy)

services:
  - type: web
    name: bookmark-graveyard-bot
    env: node
    region: singapore # Change to your preferred region
    plan: free
    branch: main
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Must be set manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: database.sqlite
      # DB_SYNCHRONIZE is false by default in production
      # Set to true only if you need auto table creation (not recommended for production)
